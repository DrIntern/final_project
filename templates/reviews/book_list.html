{% extends "_base.html" %}

{% block title %}Books Reviews{% endblock %}
{% block main %}
  <a class="btn btn-success btn-sm float-end" href="{% url 'reviews:create' %}">
    + New Review
  </a>
  <h2>Books we have opinions about!</h2>
  <ul class="list-group list-group-flush mb-3">
    {% for book in book_list %}
      <li class="list-group-item">
        <a href="{{book.get_absolute_url}}">{{ book.title }}</a>
        <a href="{% url 'reviews:delete' book.pk %}"
          class="btn btn-danger btn-sm float-end me-2">Delete</a>
        <a href="{% url 'reviews:update' book.pk %}"
          class="btn btn-info btn-sm float-end me-2">Update</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
